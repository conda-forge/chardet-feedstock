{% set version = "6.0.0" %}

package:
  name: chardet
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/chardet/chardet-{{ version }}.tar.gz
  sha256: aaa00ede13dd39a582de2b1254221a1f3e1c77e7738036431b6cb7e6a05b4f19

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vvv
  entry_points:
    - chardetect = chardet.cli.chardetect:main

requirements:
  host:
    - hatchling
    - hatch-vcs
    - python {{ python_min }}.*
    - pip
  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - chardet
  commands:
    - chardetect --help

about:
  home: https://github.com/chardet/chardet
  license: LGPL-2.1-only
  license_family: GPL
  license_file: LICENSE
  summary: Universal character encoding detector
  description: |
    chardet is a character encoding auto-detector in Python.
  doc_url: http://chardet.readthedocs.org/
  doc_source_url: https://github.com/chardet/chardet/blob/master/docs/index.rst
  dev_url: https://github.com/chardet/chardet


extra:
  recipe-maintainers:
    - dan-blanchard
    - sigmavirus24
    - nehaljwani
