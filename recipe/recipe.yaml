schema_version: 1

context:
  version: "7.4.1"

package:
  name: chardet
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/c/chardet/chardet-${{ version }}.tar.gz
  sha256: cda41132a45dfbf6984dade1f531a4098c813caf266c66cc446d90bb9369cabd

build:
  noarch: python
  number: 0
  script: ${{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation
  python:
    entry_points:
      - chardetect = chardet.cli:main

requirements:
  host:
    - hatchling
    - hatch-vcs
    - python ${{ python_min }}.*
    - pip
  run:
    - python >=${{ python_min }}

tests:
  - python:
      python_version: ${{ python_min }}.*
      imports:
        - chardet
      pip_check: true
  - script:
      - chardetect --help

about:
  homepage: https://github.com/chardet/chardet
  license: 0BSD
  license_file: LICENSE
  summary: Universal character encoding detector
  description: |
    chardet is a character encoding auto-detector in Python.
  documentation: http://chardet.readthedocs.org/
  repository: https://github.com/chardet/chardet

extra:
  recipe-maintainers:
    - dan-blanchard
    - sigmavirus24
    - nehaljwani
